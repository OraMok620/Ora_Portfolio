<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projects Showcase</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body,html{
height:100%;
font-family:Arial, sans-serif;
color:white;
}

/* ===== BACKGROUND ===== */
.hero{
position:relative;
min-height:100vh;
background:url('background.jpg') center/cover no-repeat;
padding:20px;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
}

.content{
position:relative;
z-index:2;
max-width:1200px;
margin:auto;
}

/* ===== TITLE ===== */
.page-title{
text-align:center;
font-size:1.6rem;
margin-top:40px;
margin-bottom:20px;
}

/* ===== FILTER ===== */
.filter-container{
display:flex;
justify-content:flex-end;
margin-bottom:15px;
}

.filter-select{
padding:6px 10px;
border-radius:20px;
border:none;
}

/* ===== PROJECT GRID ===== */
.project-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

/* ===== PROJECT CARD ===== */
.project-card{
background:rgba(255,255,255,0.9);
color:black;
border-radius:14px;
overflow:hidden;
text-decoration:none;
transition:0.2s;
}

.project-card:hover{
transform:scale(1.03);
}

/* image */
.project-img{
width:100%;
height:110px;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

/* text */
.project-info{
padding:10px;
text-align:center;
}

.project-title{
font-size:0.9rem;
font-weight:bold;
}

.project-tag{
font-size:0.75rem;
color:#555;
}

/* ===== HAMBURGER ===== */
.hamburger{
position:absolute;
top:20px;
right:20px;
z-index:3;
cursor:pointer;
}

.hamburger div{
width:25px;
height:3px;
background:white;
margin:5px 0;
}

/* ===== SIDE MENU ===== */
.side-menu{
position:fixed;
top:0;
right:-250px;
width:250px;
height:100%;
background:white;
padding-top:60px;
transition:0.3s;
z-index:5;
}

.side-menu.active{
right:0;
}

.side-menu a{
display:block;
padding:15px 20px;
text-decoration:none;
color:black;
font-size:1.1rem;
}

.side-menu a:hover{
background:#f0f0f0;
}

.close-btn{
position:absolute;
top:15px;
right:20px;
font-size:22px;
cursor:pointer;
}

/* ===== DESKTOP ===== */
@media(min-width:768px){

.project-grid{
grid-template-columns:repeat(3,1fr);
}

.page-title{
font-size:2rem;
}

}

</style>
</head>

<body>

<section class="hero">

<!-- Hamburger -->
<div class="hamburger" onclick="openMenu()">
<div></div>
<div></div>
<div></div>
</div>

<div class="content">

<h1 class="page-title">Showcase</h1>

<!-- Filter -->
<div class="filter-container">
<select class="filter-select" id="filter">
<option value="all">Filter</option>
<option value="ux">UX</option>
<option value="research">Research</option>
<option value="dev">Development</option>
</select>
</div>

<!-- Projects -->
<div class="project-grid" id="projectGrid">

<a href="detailsEng.html" class="project-card" data-tag="ux">
<div class="project-img">
<img src="gwds.jpg" alt="Project Image">
</div>
<div class="project-info">
<div class="project-title">Project Title</div>
<div class="project-tag">UX</div>
</div>
</a>

<a href="detailsEng.html" class="project-card" data-tag="research">
<div class="project-img">
Image
</div>
<div class="project-info">
<div class="project-title">Project Title</div>
<div class="project-tag">Research</div>
</div>
</a>

<a href="detailsEng.html" class="project-card" data-tag="dev">
<div class="project-img">
Image
</div>
<div class="project-info">
<div class="project-title">Project Title</div>
<div class="project-tag">Development</div>
</div>
</a>

<a href="detailsEng.html" class="project-card" data-tag="ux">
<div class="project-img">
Image
</div>
<div class="project-info">
<div class="project-title">Project Title</div>
<div class="project-tag">UX</div>
</div>
</a>

</div>

</div>
</section>

<!-- SIDE MENU -->
<div class="side-menu" id="sideMenu">
<div class="close-btn" onclick="closeMenu()">✕</div>
<a href="index.html">Home</a>
<a href="showcaseEng.html">Projects</a>
<a href="personalEng.html">Personal</a>
<a href="mailto:mokoishun620@gmail.com">Contact</a>
</div>

<script>

/* ===== MENU ===== */

function openMenu(){
document.getElementById("sideMenu").classList.add("active");
}

function closeMenu(){
document.getElementById("sideMenu").classList.remove("active");
}

/* ===== FILTER ===== */

const filter = document.getElementById("filter");
const cards = document.querySelectorAll(".project-card");

filter.addEventListener("change", function(){

const value = this.value;

cards.forEach(card =>{

if(value === "all"){
card.style.display="block";
}
else if(card.dataset.tag === value){
card.style.display="block";
}
else{
card.style.display="none";
}

})

});

</script>

</body>
</html>
