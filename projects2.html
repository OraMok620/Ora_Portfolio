<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Showcase</title>

  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* ===== HERO BACKGROUND ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      background: url("bg.jpg") center/cover no-repeat;
      padding: 80px 20px;
      color: white;
    }

    /* Overlay */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    /* Content wrapper */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: auto;
    }

    /* ===== Title + Filter Row ===== */
    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      margin-bottom: 30px;
    }

    .top-bar h1 {
      font-size: 1.5rem;
    }

    /* Filter dropdown */
    .filter {
      position: absolute;
      right: 0;
    }

    .filter select {
      padding: 6px 10px;
      border-radius: 20px;
      border: none;
      font-size: 0.8rem;
    }

    /* ===== Grid Layout ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* mobile first */
      gap: 20px;
    }

    /* Tablet */
    @media (min-width: 768px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .top-bar h1 {
        font-size: 2rem;
      }
    }

    /* ===== Card Style ===== */
    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 20px;
      overflow: hidden;
      transition: 0.3s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .card-content {
      padding: 10px;
      text-align: center;
      color: black;
    }

    .card-content h3 {
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .tag {
      display: inline-block;
      background: #ddd;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
    }

    /* ===== Hamburger ===== */
    .hamburger {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 25px;
      cursor: pointer;
      z-index: 3;
    }

    .hamburger span {
      display: block;
      height: 3px;
      background: white;
      margin: 5px 0;
    }

    /* ===== Side Menu ===== */
    .menu {
      position: fixed;
      top: 0;
      right: -250px;
      width: 250px;
      height: 100%;
      background: white;
      padding: 60px 20px;
      transition: right 0.3s ease;
      z-index: 4;
    }

    .menu a {
      display: block;
      margin: 20px 0;
      text-decoration: none;
      color: black;
      font-size: 1.2rem;
    }

    .menu.active {
      right: 0;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 1.5rem;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <!-- Hamburger -->
  <div class="hamburger" onclick="openMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <section class="hero">
    <div class="container">

      <!-- Title + Filter -->
      <div class="top-bar">
        <h1>Showcase</h1>

        <div class="filter">
          <select id="filterSelect" onchange="filterProjects()">
            <option value="all">All</option>
            <option value="ux">UX</option>
            <option value="tech">Tech</option>
            <option value="design">Design</option>
          </select>
        </div>
      </div>

      <!-- Project Grid -->
      <div class="grid" id="projectGrid">

        <div class="card" data-category="design">
          <img src="Logo.jpg">
          <div class="card-content">
            <h3>Web & Logo design</h3>
            <span class="tag">Design</span>
            <span class="tag">AdobeCreative</span>
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
          </div>
        </div>

        <div class="card" data-category="tech">
          <img src="CreativeCoding1.jpg">
          <div class="card-content">
            <h3>Creative coding</h3>
            <span class="tag">Coding</span>
            <span class="tag">JS</span>
          </div>
        </div>

        <div class="card" data-category="tech">
          <img src="PirateGame.png">
          <div class="card-content">
            <h3>Pirate 3D Game</h3>
            <span class="tag">Coding</span>
            <span class="tag">Unity</span>
            <span class="tag">C#</span>
            <span class="tag">Maya</span>
            <span class="tag">3D_Modeling</span>
          </div>
        </div>

        <div class="card" data-category="ux">
          <img src="UX1.png">
          <div class="card-content">
            <h3>UX Project</h3>
            <span class="tag">UX</span>
          </div>
        </div>

      </div>

    </div>
  </section>

  <!-- Side Menu -->
  <div class="menu" id="menu">
    <div class="close" onclick="closeMenu()">✕</div>
    <a href="index.html">Home</a>
    <a href="projects2.html">Projects</a>
    <a href="#">Personal</a>
    <a href="#">Contact</a>
  </div>

  <script>
    function openMenu() {
      document.getElementById("menu").classList.add("active");
    }

    function closeMenu() {
      document.getElementById("menu").classList.remove("active");
    }

    function filterProjects() {
      const value = document.getElementById("filterSelect").value;
      const cards = document.querySelectorAll(".card");

      cards.forEach(card => {
        if (value === "all" || card.dataset.category === value) {
          card.style.display = "block";
        } else {
          card.style.display = "none";
        }
      });
    }
  </script>

</body>
</html>
