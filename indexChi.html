<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ora's Portfolio_Home</title>

<style>

/* ========== RESET ========== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

html, body {
    height: 100%;
}

/* ========== BACKGROUND SECTION ========== */
.hero {
    position: relative;
    height: 100vh;
    background: url("bg.jpg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

/* Black overlay filter */
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5); /* 50% black filter */
}

/* Content above overlay */
.hero-content {
    position: relative;
    z-index: 1;
    padding: 20px;
}

.hero h1 {
    font-size: 1.5rem;
    margin-bottom: 10px;
}

.hero h2 {
    font-size: 1rem;
    font-weight: normal;
    margin-bottom: 20px;
}

/* CV Button */
.cv-btn {
    display: inline-block;
    padding: 10px 20px;
    border: 1px solid white;
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    transition: 0.3s;
}

.cv-btn:hover {
    background: white;
    color: black;
}

/* ========== HAMBURGER BUTTON ========== */
.menu-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 2;
    cursor: pointer;
}

.menu-btn div {
    width: 25px;
    height: 3px;
    background: white;
    margin: 5px 0;
    transition: 0.3s;
}

/* ========== SIDE MENU ========== */
.side-menu {
    position: fixed;
    top: 0;
    right: -250px;
    width: 250px;
    height: 100%;
    background: white;
    padding-top: 60px;
    transition: 0.3s;
}

.side-menu.active {
    right: 0;
}

.side-menu a {
    display: block;
    padding: 15px 20px;
    text-decoration: none;
    color: black;
    font-size: 1rem;
}

.side-menu a:hover {
    background: #f2f2f2;
}

/* Close button */
.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 20px;
    cursor: pointer;
}

/* ========== DESKTOP VERSION ========== */
@media (min-width: 768px) {

    .hero h1 {
        font-size: 2.5rem;
    }

    .hero h2 {
        font-size: 1.2rem;
    }

    .cv-btn {
        font-size: 1rem;
    }
}

</style>
</head>
<body>

<!-- HERO SECTION -->
<section class="hero">

    <!-- Hamburger -->
    <div class="menu-btn" onclick="openMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <!-- Introduction -->
    <div class="hero-content">
        <h1>Hi, I am Oi Shun, Mok</h1>
        <h2>Can call me Ora<br>UX Designer / UX Researcher / Developer</h2>
        <a href="CV.pdf" class="cv-btn" download>Download CV</a>
    </div>

</section>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
    <div class="close-btn" onclick="closeMenu()">✕</div>
    <a href="indexChi.html">Home</a>
    <a href="showcaseChi.html">Projects</a>
    <a href="personalChi.html">Personal</a>
    <a href="mailto:mokoishun620@gmail.com">Contact</a>
</div>

<script>

/* Open menu */
function openMenu() {
    document.getElementById("menu").classList.add("active");
}

/* Close menu */
function closeMenu() {
    document.getElementById("menu").classList.remove("active");
}

</script>

</body>
</html>
