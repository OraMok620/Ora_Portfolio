<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ora's Portfolio_Home</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    font-family: Arial, sans-serif;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
    width: 100%;
    background: url('background.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    overflow: hidden;
}

/* Overlay */
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    animation: fadeOverlay 1.5s ease forwards;
}

@keyframes fadeOverlay {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Center Content */
.hero-content {
    position: relative;
    z-index: 2;
    padding: 20px;
    opacity: 0;
    transform: translateY(15px);
    animation: fadeUp 1.2s ease forwards;
    animation-delay: 0.5s;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.hero-content h1 {
    font-size: 1.6rem;
    margin-bottom: 10px;
}

.hero-content h2 {
    font-size: 1rem;
    font-weight: normal;
    margin-bottom: 20px;
    line-height: 1.4;
}

/* CV Button */
.cv-btn {
    display: inline-block;
    padding: 10px 22px;
    border: 1px solid white;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.cv-btn:hover {
    background: white;
    color: black;
}

/* ===== HAMBURGER ===== */
.hamburger {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 3;
    cursor: pointer;
    transition: opacity 0.3s ease;
}

.hamburger.hidden {
    opacity: 0;
    pointer-events: none;
}

.hamburger div {
    width: 26px;
    height: 3px;
    background: white;
    margin: 5px 0;
}

/* ===== MENU OVERLAY ===== */
.menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
    z-index: 8;
}

.menu-overlay.active {
    opacity: 1;
    visibility: visible;
}

/* ===== SIDE MENU ===== */
.side-menu {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: white;
    padding-top: 70px;
    transition: right 0.35s cubic-bezier(.77,0,.18,1);
    z-index: 10;
    box-shadow: -5px 0 15px rgba(0,0,0,0.15);
}

.side-menu.active {
    right: 0;
}

.side-menu a {
    display: block;
    padding: 16px 24px;
    text-decoration: none;
    color: #333;
    font-size: 1.1rem;
    transition: 0.2s;
}

.side-menu a:hover {
    background: #f2f2f2;
    padding-left: 30px;
}

/* Close button */
.close-btn {
    position: absolute;
    top: 18px;
    right: 22px;
    font-size: 26px;
    cursor: pointer;
    z-index: 11;
}

/* ===== DESKTOP ===== */
@media(min-width:768px){
    .hero-content h1 { font-size: 2.6rem; }
    .hero-content h2 { font-size: 1.2rem; }
}
</style>
</head>

<body>

<section class="hero">

    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <!-- Center Content -->
    <div class="hero-content">
        <h1>Hi, I am Oi Shun, Mok</h1>
        <h2>Can call me Ora<br>UX Designer / Developer / Researcher</h2>
        <a href="CV.pdf" class="cv-btn" download>Download CV</a>
    </div>

</section>

<!-- Dark overlay when menu opens -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- Side Menu -->
<nav class="side-menu" id="sideMenu">
    <div class="close-btn" id="closeBtn">✕</div>
    <a href="index.html">Home</a>
    <a href="showcase.html">Projects</a>
    <a href="personal.html">Personal</a>
    <a href="mailto:mokoishun620@gmail.com">Contact</a>
</nav>

<script>
const hamburger = document.getElementById("hamburger");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("menuOverlay");
const closeBtn = document.getElementById("closeBtn");
const menuLinks = document.querySelectorAll(".side-menu a");

function openMenu() {
    sideMenu.classList.add("active");
    overlay.classList.add("active");
    hamburger.classList.add("hidden");
}

function closeMenu() {
    sideMenu.classList.remove("active");
    overlay.classList.remove("active");
    hamburger.classList.remove("hidden");
}

hamburger.addEventListener("click", openMenu);
closeBtn.addEventListener("click", closeMenu);
overlay.addEventListener("click", closeMenu);

menuLinks.forEach(link => {
    link.addEventListener("click", closeMenu);
});
</script>

</body>
</html>
